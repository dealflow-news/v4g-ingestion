services:
  web:
    build: .
    ports:
      - "5000:5000"
    env_file: .env
    volumes:
      - ./src:/app/src
      - ./sql:/app/sql
    command: >
      flask --app src.web.app run
      --host 0.0.0.0 --port 5000 --debug

  worker:
    build: .
    env_file: .env
    volumes:
      - ./src:/app/src
    command: python -m src.enrichment.runner
    depends_on:
      - web
